<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="180" height="180" rx="40" fill="none" stroke="url(#g)" stroke-width="4">
    <animate attributeName="stroke-dasharray" values="0 1000; 1000 0" dur="2s" fill="freeze"/>
  </rect>
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#g)" text-anchor="middle" opacity="0">
    SP
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1s" fill="freeze"/>
  </text>
  <circle cx="100" cy="100" r="5" fill="#6366f1" opacity="0">
    <animate attributeName="r" values="0; 80" dur="1.5s" begin="0s" repeatCount="1"/>
    <animate attributeName="opacity" values="0.3; 0" dur="1.5s" begin="0s" repeatCount="1"/>
  </circle>
  <circle cx="100" cy="100" r="5" fill="#a855f7" opacity="0">
    <animate attributeName="r" values="0; 60" dur="1.5s" begin="0.3s" repeatCount="1"/>
    <animate attributeName="opacity" values="0.3; 0" dur="1.5s" begin="0.3s" repeatCount="1"/>
  </circle>
</svg>
